<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agente de Obras</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f4f8;
      --surface: #ffffff;
      --surface-2: #f8fafc;
      --border: #e2e8f0;
      --border-strong: #cbd5e1;
      --text: #0f172a;
      --text-muted: #64748b;
      --text-light: #94a3b8;
      --blue: #2563eb;
      --blue-dark: #1d4ed8;
      --blue-light: #dbeafe;
      --blue-xlight: #eff6ff;
      --teal: #0891b2;
      --teal-light: #cffafe;
      --teal-xlight: #ecfeff;
      --green: #16a34a;
      --green-light: #dcfce7;
      --green-dark: #15803d;
      --red: #dc2626;
      --red-light: #fee2e2;
      --purple: #7c3aed;
      --purple-xlight: #f5f3ff;
      --orange: #f59e0b;
      --radius-sm: 8px;
      --radius: 14px;
      --radius-xl: 24px;
      --shadow: 0 4px 24px rgba(15,23,42,0.08);
      font-family: Inter, system-ui, -apple-system, sans-serif;
    }

    body { background: var(--bg); color: var(--text); min-height: 100vh; }

    .layout { display: grid; grid-template-columns: 1fr 360px; grid-template-rows: 100vh; max-width: 1400px; margin: 0 auto; padding: 20px; gap: 20px; }
    @media (max-width: 900px) { .layout { grid-template-columns: 1fr; grid-template-rows: auto auto; height: auto; } }

    .chat-panel { background: var(--surface); border-radius: var(--radius-xl); box-shadow: var(--shadow); border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; min-height: 0; }

    .chat-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .chat-header-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--blue), var(--teal)); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .chat-header-info h1 { font-size: 1rem; font-weight: 700; color: var(--text); letter-spacing: -0.02em; }
    .chat-header-info p { font-size: 0.8rem; color: var(--text-muted); margin-top: 1px; }
    .status-dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; margin-left: auto; flex-shrink: 0; box-shadow: 0 0 0 2px #dcfce7; }

    .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }

    .bubble { max-width: 85%; display: flex; flex-direction: column; gap: 4px; }
    .bubble.user { align-self: flex-end; align-items: flex-end; }
    .bubble.ai { align-self: flex-start; align-items: flex-start; }
    .bubble-label { font-size: 0.72rem; font-weight: 600; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.05em; padding: 0 4px; }
    .bubble-content { padding: 12px 16px; border-radius: var(--radius); line-height: 1.6; font-size: 0.9rem; white-space: pre-wrap; word-break: break-word; }
    .bubble.user .bubble-content { background: var(--text); color: white; border-bottom-right-radius: 4px; }
    .bubble.ai .bubble-content { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .bubble.ai .bubble-content.error { background: #fef2f2; border-color: #fecaca; color: var(--red); }

    .cards-container { align-self: flex-start; width: 100%; display: flex; flex-direction: column; gap: 6px; }
    .cards-label { font-size: 0.72rem; font-weight: 600; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.05em; padding: 0 4px; margin-bottom: 2px; }

    .category-card { background: var(--purple-xlight); border: 1px solid #ddd6fe; border-radius: var(--radius); padding: 12px 16px; cursor: pointer; transition: all 0.15s ease; position: relative; overflow: hidden; }
    .category-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--purple); border-radius: 3px 0 0 3px; }
    .category-card:hover { background: #ede9fe; border-color: var(--purple); transform: translateY(-1px); }
    .category-card .card-title { font-weight: 600; font-size: 0.88rem; color: #5b21b6; }

    .next-card { background: #fefce8; border: 1px solid #fde68a; border-radius: var(--radius); padding: 12px 16px; cursor: pointer; transition: all 0.15s ease; position: relative; overflow: hidden; }
    .next-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--orange); border-radius: 3px 0 0 3px; }
    .next-card:hover { background: #fef08a; border-color: var(--orange); transform: translateY(-1px); }
    .next-card .card-title { font-weight: 600; font-size: 0.88rem; color: #92400e; }

    .service-card { background: var(--teal-xlight); border: 1px solid var(--teal-light); border-radius: var(--radius); padding: 14px 16px; cursor: pointer; transition: all 0.15s ease; position: relative; overflow: hidden; }
    .service-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--teal); border-radius: 3px 0 0 3px; }
    .service-card:hover { background: #a5f3fc; border-color: var(--teal); transform: translateY(-1px); }
    .service-card .card-number { font-size: 0.72rem; font-weight: 700; color: var(--teal); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
    .service-card .card-title { font-weight: 600; font-size: 0.88rem; color: #0e7490; line-height: 1.4; margin-bottom: 8px; }
    .service-card .supplies-label { font-size: 0.72rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px; }
    .supplies-tags { display: flex; flex-wrap: wrap; gap: 4px; }
    .supply-tag { background: white; border: 1px solid var(--teal-light); border-radius: 6px; padding: 2px 8px; font-size: 0.75rem; color: #0e7490; line-height: 1.5; }
    .no-supplies { font-size: 0.78rem; color: var(--text-light); font-style: italic; }

    .product-card { background: var(--blue-xlight); border: 1px solid var(--blue-light); border-radius: var(--radius); padding: 14px 16px; cursor: pointer; transition: all 0.15s ease; position: relative; overflow: hidden; }
    .product-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--blue); border-radius: 3px 0 0 3px; }
    .product-card:hover { background: #bfdbfe; border-color: var(--blue); transform: translateY(-1px); }
    .product-card .card-number { font-size: 0.72rem; font-weight: 700; color: var(--blue); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
    .product-card .card-title { font-weight: 600; font-size: 0.88rem; color: #1e40af; line-height: 1.4; margin-bottom: 6px; }
    .product-card .card-meta { display: flex; flex-wrap: wrap; gap: 6px; }
    .meta-tag { background: white; border: 1px solid var(--blue-light); border-radius: 6px; padding: 2px 8px; font-size: 0.75rem; color: #1e40af; }

    .manual-search-btn { margin-top: 6px; padding: 10px 16px; border: 1px dashed var(--blue); border-radius: var(--radius-sm); background: var(--blue-xlight); color: var(--blue); font-weight: 600; cursor: pointer; font-size: 0.85rem; width: 100%; transition: all 0.15s; text-align: left; }
    .manual-search-btn:hover { background: var(--blue-light); }
    .manual-search-row { display: flex; gap: 8px; margin-top: 8px; }
    .manual-search-row input { flex: 1; padding: 10px 14px; border: 1px solid var(--border-strong); border-radius: var(--radius-sm); font-size: 0.9rem; outline: none; }
    .manual-search-row input:focus { border-color: var(--blue); }
    .manual-search-row button { padding: 10px 16px; border: none; border-radius: var(--radius-sm); background: var(--blue); color: white; font-weight: 600; cursor: pointer; }

    .quantity-container { align-self: flex-start; width: 100%; background: #fffbeb; border: 1px solid #fde68a; border-radius: var(--radius); padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .quantity-container .qty-label { font-size: 0.82rem; font-weight: 600; color: #92400e; }
    .quantity-container .qty-input-row { display: flex; gap: 8px; }
    .quantity-container input { flex: 1; padding: 10px 14px; border: 1px solid #fde68a; border-radius: var(--radius-sm); font-size: 1rem; color: var(--text); background: white; outline: none; }
    .quantity-container input:focus { border-color: var(--orange); }
    .quantity-container .unit-badge { padding: 10px 12px; background: #fde68a; border-radius: 8px; font-weight: 600; color: #92400e; font-size: 0.85rem; white-space: nowrap; }
    .quantity-container button { padding: 10px 20px; border: none; border-radius: var(--radius-sm); background: var(--orange); color: white; font-weight: 700; cursor: pointer; }

    .card-selected { pointer-events: none; opacity: 0.5; }
    .card-selected-highlight { pointer-events: none; opacity: 1 !important; border-color: var(--green) !important; background: var(--green-light) !important; }

    .composer { border-top: 1px solid var(--border); padding: 16px 20px; display: flex; gap: 10px; align-items: flex-end; flex-shrink: 0; background: var(--surface); }
    .composer textarea { flex: 1; min-height: 64px; max-height: 160px; resize: none; border: 1px solid var(--border-strong); border-radius: var(--radius); padding: 12px 14px; font-size: 0.9rem; font-family: inherit; line-height: 1.5; color: var(--text); background: var(--surface-2); outline: none; transition: border-color 0.15s; }
    .composer textarea:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
    .composer textarea::placeholder { color: var(--text-light); }
    .send-btn { width: 44px; height: 44px; border: none; border-radius: var(--radius-sm); background: var(--blue); color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.15s, transform 0.1s; }
    .send-btn:hover:not(:disabled) { background: var(--blue-dark); transform: scale(1.05); }
    .send-btn:disabled { background: var(--border-strong); cursor: not-allowed; }
    .send-btn svg { width: 18px; height: 18px; }

    .status-bar { padding: 8px 20px 12px; font-size: 0.78rem; color: var(--text-light); text-align: center; flex-shrink: 0; }

    .sidebar { display: flex; flex-direction: column; gap: 16px; min-height: 0; }
    .sidebar-panel { background: var(--surface); border-radius: var(--radius-xl); box-shadow: var(--shadow); border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
    .sidebar-header { padding: 18px 20px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .sidebar-header h2 { font-size: 0.92rem; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 8px; }
    .item-count { background: var(--blue-light); color: var(--blue); font-size: 0.72rem; font-weight: 700; padding: 2px 8px; border-radius: 99px; }

    .selected-list { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
    .selected-list::-webkit-scrollbar { width: 3px; }
    .selected-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 20px; gap: 8px; color: var(--text-light); }
    .empty-state span { font-size: 28px; }
    .empty-state p { font-size: 0.82rem; text-align: center; line-height: 1.5; }

    .selected-item { background: var(--green-light); border: 1px solid #86efac; border-radius: var(--radius-sm); padding: 10px 12px; }
    .selected-item .item-type { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--green-dark); margin-bottom: 2px; }
    .selected-item .item-desc { font-size: 0.82rem; font-weight: 600; color: #14532d; line-height: 1.4; }
    .selected-item .item-qty { font-size: 0.78rem; color: #166534; margin-top: 3px; }

    .sidebar-actions { display: flex; gap: 8px; padding: 0 12px 12px; flex-shrink: 0; }
    .export-btn { flex: 1; padding: 12px; border: none; border-radius: var(--radius); background: var(--green); color: white; font-weight: 700; font-size: 0.88rem; cursor: pointer; transition: background 0.15s; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .export-btn:hover:not(:disabled) { background: var(--green-dark); }
    .export-btn:disabled { background: var(--border-strong); color: var(--text-light); cursor: not-allowed; }
    .clear-btn { padding: 12px 14px; border: 1px solid var(--border-strong); border-radius: var(--radius); background: white; color: var(--text-muted); font-weight: 600; font-size: 0.88rem; cursor: pointer; transition: all 0.15s; }
    .clear-btn:hover:not(:disabled) { border-color: var(--red); color: var(--red); background: var(--red-light); }
    .clear-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .typing { display: flex; gap: 4px; padding: 12px 16px; background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius); border-bottom-left-radius: 4px; width: fit-content; }
    .typing span { width: 6px; height: 6px; background: var(--text-light); border-radius: 50%; animation: bounce 1.2s infinite; }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .modal-overlay.hidden { display: none; }
    .modal { background: white; border-radius: var(--radius-xl); padding: 28px; width: 420px; max-width: 90vw; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
    .modal h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 16px; }
    .modal input { width: 100%; padding: 12px 14px; border: 1px solid var(--border-strong); border-radius: var(--radius-sm); font-size: 0.95rem; outline: none; margin-bottom: 16px; }
    .modal input:focus { border-color: var(--blue); }
    .modal-buttons { display: flex; gap: 10px; justify-content: flex-end; }
    .modal-buttons button { padding: 10px 20px; border: none; border-radius: var(--radius-sm); font-weight: 600; cursor: pointer; }
    .btn-cancel { background: var(--surface-2); color: var(--text-muted); }
    .btn-confirm { background: var(--green); color: white; }
    .btn-confirm:hover { background: var(--green-dark); }

    .history-panel { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .history-panel.hidden { display: none; }
    .history-box { background: white; border-radius: var(--radius-xl); width: 720px; max-width: 95vw; max-height: 85vh; display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,0.2); overflow: hidden; }
    .history-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .history-header h2 { font-size: 1rem; font-weight: 700; }
    .history-header-actions { display: flex; align-items: center; gap: 8px; }
    .history-close { background: none; border: none; font-size: 1.4rem; cursor: pointer; color: var(--text-muted); }
    .history-search { padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; gap: 8px; }
    .history-search input { flex: 1; padding: 10px 14px; border: 1px solid var(--border-strong); border-radius: var(--radius-sm); font-size: 0.9rem; outline: none; }
    .history-search input:focus { border-color: var(--blue); }
    .show-archived-btn { padding: 8px 12px; border: 1px solid var(--border-strong); border-radius: var(--radius-sm); background: white; font-size: 0.8rem; cursor: pointer; color: var(--text-muted); white-space: nowrap; }
    .show-archived-btn.active { background: var(--blue-xlight); border-color: var(--blue); color: var(--blue); }
    .history-list { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }

    .history-item { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px 16px; transition: all 0.15s; }
    .history-item.archived { opacity: 0.6; border-style: dashed; }
    .history-item-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 6px; }
    .history-item-info { cursor: pointer; flex: 1; }
    .history-item-info:hover .h-engineer { text-decoration: underline; }
    .history-item .h-engineer { font-size: 0.72rem; font-weight: 700; color: var(--blue); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 2px; }
    .history-item .h-date { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 4px; }
    .history-item .h-summary { font-size: 0.82rem; color: var(--text); }
    .history-item .h-version { display: inline-block; background: var(--blue-light); color: var(--blue); font-size: 0.7rem; font-weight: 700; padding: 1px 6px; border-radius: 99px; margin-left: 6px; }
    .history-item-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .h-btn { padding: 5px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: white; font-size: 0.75rem; cursor: pointer; color: var(--text-muted); transition: all 0.15s; white-space: nowrap; }
    .h-btn:hover { border-color: var(--blue); color: var(--blue); }
    .h-btn.danger:hover { border-color: var(--red); color: var(--red); background: var(--red-light); }
    .h-btn.success { border-color: var(--green); color: var(--green); background: var(--green-light); }
  </style>
</head>
<body>
<div class="layout">
  <div class="chat-panel">
    <div class="chat-header">
      <div class="chat-header-icon">🏗️</div>
      <div class="chat-header-info">
        <h1>Agente de Obras</h1>
        <p>Monte listas de materiais com inteligência artificial</p>
      </div>
      <div class="status-dot"></div>
    </div>
    <div class="messages" id="messages"></div>
    <div class="composer">
      <textarea id="user-input" placeholder="Descreva os serviços da obra ou responda o agente..." rows="2"></textarea>
      <button class="send-btn" id="send-btn" title="Enviar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
    <div class="status-bar" id="status-bar">Pronto. Descreva os serviços para começar.</div>
  </div>

  <div class="sidebar">
    <div class="sidebar-panel" style="flex: 1; min-height: 0;">
      <div class="sidebar-header">
        <h2>📋 Lista de Materiais <span class="item-count" id="item-count">0</span></h2>
        <button onclick="openHistory()" style="background:none;border:none;cursor:pointer;font-size:1.2rem;" title="Histórico">🕐</button>
      </div>
      <div class="selected-list" id="selected-list">
        <div class="empty-state"><span>📦</span><p>Nenhum item selecionado.<br>Inicie uma conversa para montar sua lista.</p></div>
      </div>
      <div class="sidebar-actions">
        <button class="export-btn" id="export-btn" disabled>⬇️ Exportar</button>
        <button class="clear-btn" id="clear-btn" disabled onclick="clearList()">🗑️</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal nome do engenheiro -->
<div class="modal-overlay hidden" id="engineer-modal">
  <div class="modal">
    <h2>👷 Identificação do Engenheiro</h2>
    <input type="text" id="engineer-name-input" placeholder="Digite seu nome completo" />
    <div class="modal-buttons">
      <button class="btn-cancel" onclick="closeEngineerModal()">Cancelar</button>
      <button class="btn-confirm" onclick="confirmExport()">Exportar e Salvar</button>
    </div>
  </div>
</div>

<!-- Painel de histórico -->
<div class="history-panel hidden" id="history-panel">
  <div class="history-box">
    <div class="history-header">
      <h2>🕐 Histórico de Listas</h2>
      <div class="history-header-actions">
        <button class="history-close" onclick="closeHistory()">✕</button>
      </div>
    </div>
    <div class="history-search">
      <input type="text" id="history-search-input" placeholder="Filtrar por nome do engenheiro..." oninput="filterHistory()" />
      <button class="show-archived-btn" id="show-archived-btn" onclick="toggleArchived()">📦 Arquivadas</button>
    </div>
    <div class="history-list" id="history-list">
      <div class="empty-state"><span>📋</span><p>Nenhuma lista salva ainda.</p></div>
    </div>
  </div>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');
  const statusBar = document.getElementById('status-bar');
  const selectedListEl = document.getElementById('selected-list');
  const itemCount = document.getElementById('item-count');
  const exportBtn = document.getElementById('export-btn');
  const clearBtn = document.getElementById('clear-btn');

  let context = null;
  let selectedItems = [];
  let typingEl = null;
  let engineerName = '';
  let currentListId = null; // ID da lista carregada do histórico (para versionar)
  let showArchived = false;

  function setStatus(text) { statusBar.textContent = text; }
  function scrollToBottom() { messagesEl.scrollTop = messagesEl.scrollHeight; }

  function clearList() {
    if (!selectedItems.length) return;
    if (!confirm('Limpar a lista atual?')) return;
    selectedItems = [];
    currentListId = null;
    renderSidebar();
  }

  // ── Modal engenheiro ──────────────────────────────────────────────────────
  function openEngineerModal() {
    document.getElementById('engineer-modal').classList.remove('hidden');
    setTimeout(() => document.getElementById('engineer-name-input').focus(), 100);
  }

  function closeEngineerModal() {
    document.getElementById('engineer-modal').classList.add('hidden');
  }

  async function confirmExport() {
    const name = document.getElementById('engineer-name-input').value.trim();
    if (!name) { document.getElementById('engineer-name-input').focus(); return; }
    engineerName = name;
    closeEngineerModal();
    await doExport();
  }

  // ── Histórico ─────────────────────────────────────────────────────────────
  async function openHistory() {
    document.getElementById('history-panel').classList.remove('hidden');
    await loadHistory();
  }

  function closeHistory() {
    document.getElementById('history-panel').classList.add('hidden');
  }

  function toggleArchived() {

    btn.classList.toggle('active', showArchived);
    btn.textContent = showArchived ? '✅ Arquivadas' : '📦 Arquivadas';
    loadHistory();

  async function loadHistory(filter = '') {
    try {
      const params = new URLSearchParams();
      if (filter) params.set('engineer_name', filter);
      if (showArchived) params.set('show_archived', 'true');
      const res = await fetch(`/history?${params}`);
      const data = await res.json();
      renderHistory(data);
    } catch (e) { console.error('Erro ao carregar histórico:', e); }
  }

  function filterHistory() {
    const filter = document.getElementById('history-search-input').value.trim();
    loadHistory(filter);
  }

  function renderHistory(items) {
    const el = document.getElementById('history-list');
    if (!items.length) {
      el.innerHTML = '<div class="empty-state"><span>📋</span><p>Nenhuma lista encontrada.</p></div>';
      return;
    }
    el.innerHTML = '';
    items.forEach(item => {
      const div = document.createElement('div');
      div.className = 'history-item' + (item.archived ? ' archived' : '');

      const date = new Date(item.created_at).toLocaleString('pt-BR');
      const versionBadge = item.version > 1 ? `<span class="h-version">v${item.version}</span>` : '';

      div.innerHTML = `
        <div class="history-item-header">
          <div class="history-item-info">
            <div class="h-engineer">👷 ${item.engineer_name}${versionBadge}</div>
            <div class="h-date">📅 ${date}</div>
            <div class="h-summary">⚙️ ${item.total_services} serviço(s) · 📦 ${item.total_products} produto(s)</div>
          </div>
          <div class="history-item-actions">
            <button class="h-btn" onclick="loadAndEdit('${item.id}', ${JSON.stringify(item.items).replace(/"/g, '&quot;')}, '${item.engineer_name}')">✏️ Editar</button>
            <button class="h-btn ${item.archived ? 'success' : 'danger'}" onclick="toggleArchiveItem('${item.id}', ${item.archived})">
              ${item.archived ? '↩️ Restaurar' : '📦 Arquivar'}
            </button>
          </div>
        </div>
      `;

      // Clique no info abre para visualizar
      div.querySelector('.history-item-info').addEventListener('click', () => {
        closeHistory();
        selectedItems = item.items || [];
        currentListId = item.id;
        engineerName = item.engineer_name;
        renderSidebar();
        addBubble(`📋 Lista de ${item.engineer_name} carregada (${date}) — v${item.version}.`, 'ai', 'IA');
      });

      el.appendChild(div);
    });
  }

  function loadAndEdit(id, items, name) {
    closeHistory();
    selectedItems = items || [];
    currentListId = id;
    engineerName = name;
    renderSidebar();
    addBubble(`✏️ Lista de ${name} carregada para edição. Exporte para salvar como nova versão.`, 'ai', 'IA');

  async function toggleArchiveItem(id, isArchived) {
      try {

          await fetch(`/history/${id}/${action}`, {

              headers: { 'Content-Type': 'application/json' },

  async function doExport() {
    const lines = [
      '═══════════════════════════════════════',
      '         LISTA DE MATERIAIS - OBRA',
      `         Engenheiro: ${engineerName}`,
      `         Gerado em: ${new Date().toLocaleString('pt-BR')}`,
      '═══════════════════════════════════════',
      '',
    ];

    let productIdx = 0;
    let serviceIdx = 0;
    const standalone = selectedItems.filter(i => i.type === 'product' && !i.parent_service);
    const services = selectedItems.filter(i => i.type === 'service');

    if (standalone.length > 0) {
      lines.push('📦 MATERIAIS DIRETOS');
      lines.push('─────────────────────────────────────');
      standalone.forEach(item => {
        productIdx++;
        const qty = item.quantity ? ` — Qtd: ${item.quantity} ${item.unity || ''}` : '';
        lines.push(`  ${productIdx}. ${item.description}${qty}`);
      });
    }

    services.forEach(service => {
        serviceIdx++;
        const qty = service.quantity ? ` — Qtd: ${service.quantity} ${service.unity || 'UN'}` : '';
        lines.push(`\n⚙️ [SERVIÇO ${serviceIdx}] ${service.description}${qty}`);
        lines.push('─────────────────────────────────────');
        const children = selectedItems.filter(i => i.type === 'product' && i.parent_service === service.description);
        if (children.length > 0) {
            children.forEach(item => {
                productIdx++;
                const qty = item.quantity ? ` — Qtd: ${item.quantity} ${item.unity || ''}` : '';
                lines.push(`  ${productIdx}. ${item.description}${qty}`);
            });
        } else {
            lines.push('  (sem insumos selecionados)');
        }
    });

    lines.push('\n═══════════════════════════════════════');
    lines.push(`Serviços: ${services.length} | Produtos: ${productIdx}`);

    const blob = new Blob([lines.join('\n')], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `lista_materiais_${new Date().toISOString().slice(0,10)}.txt`;
    a.click();
    URL.revokeObjectURL(url);

    // Salva no banco — se tem currentListId, salva como nova versão
    try {
      await fetch('/save-list', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          engineer_name: engineerName,
          items: selectedItems,
          total_services: services.length,
          total_products: productIdx,
          parent_id: currentListId || null,
        }),
      });
    } catch (e) { console.error('Erro ao salvar lista:', e); }

    setTimeout(() => resetChat(), 500);
  }

  function addBubble(text, role, label, isError = false) {
    const wrapper = document.createElement('div');
    wrapper.className = `bubble ${role}`;
    if (label) {
      const lbl = document.createElement('div');
      lbl.className = 'bubble-label';
      lbl.textContent = label;
      wrapper.appendChild(lbl);
    }
    const content = document.createElement('div');
    content.className = 'bubble-content' + (isError ? ' error' : '');
    content.textContent = text;

  function addManualSearchInput(wrapper) {
    const btn = document.createElement('button');
    btn.className = 'manual-search-btn';
    btn.textContent = '🔍 Buscar outro termo';
    wrapper.appendChild(btn);

    btn.addEventListener('click', () => {
      btn.style.display = 'none';
      const row = document.createElement('div');
      row.className = 'manual-search-row';
      const input = document.createElement('input');
      input.type = 'text';
      input.placeholder = 'Digite o termo de busca...';
      const searchBtn = document.createElement('button');
      searchBtn.textContent = 'Buscar';
      row.appendChild(input);
      row.appendChild(searchBtn);
      wrapper.appendChild(row);
      input.focus();

      const doSearch = () => {
        const term = input.value.trim();
        if (!term) return;
        row.style.opacity = '0.5';
        row.style.pointerEvents = 'none';
        addBubble(`🔍 Buscando: "${term}"`, 'user', 'Engenheiro');
        sendMessage(`manual_search:${term}`, true);
      };

      searchBtn.addEventListener('click', doSearch);
      input.addEventListener('keydown', (e) => { if (e.key === 'Enter') doSearch(); });
    });
  }

  async function sendMessage(userInput, skipBubble = false) {
      if (!skipBubble) addBubble(userInput, 'user', 'Engenheiro');
      sendBtn.disabled = true;
      setStatus('Agente processando...');
      showTyping();

      let payload = { user_input: userInput, context };

      // Se tem itens carregados do histórico, injeta no state para não perder
      if (selectedItems.length > 0 && !context?.state?.selected_items?.length) {
          payload = {
              user_input: userInput,
              context: {
                  ...(context || {}),
                  state: {
                      ...(context?.state || {}),
                      selected_items: selectedItems,
                  }
              }
          };
      }

      try {
          const parsed = JSON.parse(userInput);
          if (parsed.type === 'category') {
              payload = {
                  user_input: `confirm_category:${parsed.description}`,
                  context: payload.context,
              };
          }
      } catch (_) {}

      try {
          const res = await fetch('/chat', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload),
          });
          hideTyping();
          if (!res.ok) throw new Error(`Erro HTTP ${res.status}`);
          const data = await res.json();
          context = data.context ?? null;

          // Atualiza itens do state mas mantém os que vieram do histórico
          if (context?.state?.selected_items) {
              selectedItems = context.state.selected_items;
              renderSidebar();
          }

          switch (data.tool) {
              case 'selecionar_categoria':
                  addCategoryCards(data.data || [], data.message);
                  setStatus('Selecione a categoria do serviço.');
                  break;
              case 'proximo_item':
                  addNextItemCards(data.data || [], data.message);
                  setStatus('Confirme para continuar.');
                  break;
              case 'buscar_servico':
                  addServiceCards(data.data || [], data.message);
                  setStatus('Clique em um serviço para selecioná-lo.');
                  break;
              case 'buscar_produto':
                  addProductCards(data.data || [], data.message);
                  setStatus('Clique em um produto para selecioná-lo.');
                  break;
              case 'perguntar_quantidade':
                  addQuantityInput(data.message, data.data?.[0]?.unity || '');
                  setStatus('Digite a quantidade.');
                  break;
              case 'buscar_manual':
                  addManualSearchBox(data.message);
                  setStatus('Digite outro termo para buscar.');
                  break;
              case 'lista_completa':
                  selectedItems = data.data || [];
                  renderSidebar();
                  addBubble(data.message, 'ai', 'IA');
                  setStatus('Lista completa! Exporte para salvar.');
                  break;
              case 'mensagem':
                  if (data.message) addBubble(data.message, 'ai', 'IA');
                  setStatus('Aguardando resposta...');
                  break;
              case 'erro':
                  addBubble(data.message, 'ai', 'IA', true);
                  setStatus('Ocorreu um erro. Tente novamente.');
                  break;
              default:
                  if (data.message) addBubble(data.message, 'ai', 'IA');
                  setStatus('Pronto.');
          }
      } catch (err) {
          hideTyping();
          addBubble(`Erro de conexão: ${err.message}`, 'ai', 'IA', true);
          setStatus('Erro de conexão com o servidor.');
      }
      sendBtn.disabled = false;
  }

  sendBtn.addEventListener('click', () => {
    const text = inputEl.value.trim();
    if (!text) return;
    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendMessage(text);
  });

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendBtn.click(); }
  });

  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
  });

  addBubble(
    'Olá! Sou o agente de obras. Descreva os serviços que serão realizados e vou ajudá-lo a montar a lista de materiais necessários.\n\nVocê pode enviar vários serviços de uma vez, separados por ponto ou vírgula.',
    'ai', 'IA'
  );
</script>
</body>
</html>
